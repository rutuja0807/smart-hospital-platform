<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            display: flex;
            width: 800px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .left {
            width: 50%;
            background: #2c5364;
            color: white;
            padding: 40px;
        }

        .left h2 {
            margin-bottom: 20px;
        }

        .left p {
            font-size: 14px;
            line-height: 1.5;
        }

        .right {
            width: 50%;
            padding: 40px;
        }

        .right h2 {
            margin-bottom: 20px;
            color: #2c5364;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2c5364;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c48;
        }

        .error {
            color: red;
            font-size: 13px;
        }

        .register-link {
            margin-top: 15px;
            text-align: center;
        }

        .register-link a {
            text-decoration: none;
            color: #2c5364;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h2>Hospital Portal</h2>
        <p>
            Book appointments, consult doctors, and manage your health online.
            Access your medical dashboard securely anytime.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <h2>Login</h2>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}

            {% if form.errors %}
                <p class="error">Invalid username or password</p>
            {% endif %}

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            <p>Don't have an account?</p>
            <a href="/register/">Register Here</a>
        </div>

    </div>

</div>

</body>
</html>
